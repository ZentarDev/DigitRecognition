<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Web application to recognize hand-drawn digits with a model exported from TensorFlow.js">
  <title>Digit Recognition</title>
  <link rel="icon" type="image/png" sizes="256x256" href="assets/images/favicon.png">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">    
    <div class="title-header">
      <div class="hero-top">
        <h1 class="centered" style="flex: 1; text-align: center;">Digit Recognition</h1>
        <span id="model-status" class="status"></span>
    </div>

    <div class="mode-controls">
        <button id="open-popup" type="button" class="mode-btn active pulse">Test - Change mode <i class="fa-solid fa-sliders"></i></button>
      </div>
    </div>
    
    <div id="modal" class="modal-overlay" hidden>
      <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="mode-popup-title">
        <div class="modal-header">
          <p id="mode-popup-title" class="subtitle centered">Choose a game mode:</p>
          <button id="close-popup" type="button" class="close pulse" aria-label="Close popup">&times;</button>
        </div>
        <div class="mode-controls">
          <button id="test-btn" type="button" class="mode-btn active pulse">Test <i class="fa-solid fa-pencil"></i></button>
          <button id="train-btn" type="button" class="mode-btn pulse">Train <i class="fa-solid fa-dumbbell"></i></button>
          <button id="think-btn" type="button" class="mode-btn pulse">Think <i class="fa-solid fa-brain"></i></button>
        </div>
      </div>
    </div>

    <div id="load-popup" class="modal-overlay" hidden>
      <div class="modal-load" role="dialog" aria-modal="true" aria-labelledby="loading-popup-title">
        <div class="spinner"></div>  
      </div>
    </div>

    <section id="layout" class="layout">
      <article id="draw-card" class="card panel">
        <div id="draw-content" class="draw-content">
          <div class="panel-header">
          <h2 style="display:grid; grid-template-columns:1fr auto 1fr; align-items:center;">
            <span id="streak-indicator" class="hint" style="justify-self:start; visibility:hidden;">
              <i class="fa-solid fa-fire"></i> 0
            </span>
            Canvas
            <i id="canv-mode-indicator" class="hint fa-solid fa-pencil" style="justify-self:end;"></i>
          </h2>
            <p id="mode-message" class="mode-message">Draw a digit and press predict.</p>
          </div>

          <div class="canvas-shell">
            <canvas id="draw-canvas" width="280" height="280" aria-label="Canvas for drawing digits"></canvas>
          </div>

          <div class="controls">
            <button id="clear-btn" type="button" class="ghost button-extended pulse">Clear  <i class="fa-solid fa-eraser"></i></button>
            <button id="predict-btn" type="button" class="button-extended pulse">Predict  <i class="fa-solid fa-check-double"></i></button>
          </div>
        </div>
      </article>

      <article id="results-card" class="card panel results">
        <h2 style="display:grid; grid-template-columns:1fr auto 1fr; align-items:center;">
          <span id="streak-indicator-canvas" class="hint" style="justify-self:start; visibility:hidden;">
            <i class="fa-solid fa-fire"></i> 0
          </span>
          Prediction
          <i id="pred-mode-indicator" class="hint fa-solid fa-pencil" style="justify-self:end;"></i>
        </h2>
        <br>

        <div class="result-main">
          <div class="preview-block">
            <canvas id="preview-canvas" width="28" height="28" aria-label="Preview of the model input"></canvas>
          </div>

          <div class="prediction-block">
            <p id="prediction" class="prediction">-</p>
            <p id="confidence" class="confidence"></p>
            <p id="error-message" class="error-message" hidden></p>
          </div>
        </div>

        <div id="bars" class="bars" aria-label="Model probabilities"></div>

        <div id="train-feedback" class="train-feedback" hidden>
          <p id="train-icon" class="train-icon" aria-live="polite"></p>
          <button id="ready-btn" type="button" class="ready-btn pulse">Ready <i class="fa-solid fa-thumbs-up"></i></button>
        </div>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="./script.js" defer></script>
</body>
</html>
