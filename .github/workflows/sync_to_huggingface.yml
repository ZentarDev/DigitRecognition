name: Sync Supabase Dataset to Hugging Face

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install dependencies
      run: npm install @supabase/supabase-js

    - name: Fetch data and build CSV
      env:
        SUPABASE_URL: "https://tkyimsswodyghjzekutl.supabase.co"
        SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: |
        node -e '
        const { createClient } = require("@supabase/supabase-js");
        const fs = require("fs");

        const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_KEY);

        async function fetchAll() {
          let all = [];
          let from = 0;
          const pageSize = 1000;
          while (true) {
            const { data, error } = await supabase
              .from("digits")
              .select("image_base64, prediction, correct, true_label")
              .range(from, from + pageSize - 1);
            if (error) { console.error(error.message); process.exit(1); }
            if (!data.length) break;
            all = all.concat(data);
            if (data.length < pageSize) break;
            from += pageSize;
          }
          return all;
        }

        async function exportData() {
          const data = await fetchAll();

          const distribution = {};
          data.forEach(r => distribution[r.true_label] = (distribution[r.true_label] || 0) + 1);
          console.log("Distribution:", JSON.stringify(distribution));

          const trainRows = [];
          const testRows = [];

          data.forEach(row => {
            const csvRow = `"${row.image_base64}",${row.prediction},${row.correct},${row.true_label}\n`;
            if (row.correct === true || row.correct === "true") {
              trainRows.push(csvRow);
            } else if (row.correct === false || row.correct === "false") {
              testRows.push(csvRow);
            }
          });

          trainRows.sort(() => Math.random() - 0.5);

          const totalRows = trainRows.length + testRows.length;
          const targetTest = Math.round(totalRows * 0.2);
          const shortage = Math.max(0, targetTest - testRows.length);
          const movedToTest = trainRows.splice(-shortage, shortage);

          const header = "image_base64,prediction,correct,true_label\n";
          fs.writeFileSync("train.csv", header + trainRows.join(""));
          fs.writeFileSync("test.csv", header + [...testRows, ...movedToTest].join(""));

          console.log(`Total: ${totalRows}`);
          console.log(`train.csv: ${trainRows.length} rows`);
          console.log(`test.csv: ${testRows.length + movedToTest.length} rows (${testRows.length} incorrect + ${movedToTest.length} correct moved)`);
        }

        exportData();
        '

    - name: Push to Hugging Face
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HF_REPO: "zentardev/handwritten-digit-dataset"
      run: |
        git config --global user.name "Github Actions Robot"
        git config --global user.email "actions@github.com"

        git clone https://oauth2:$HF_TOKEN@huggingface.co/datasets/$HF_REPO hf_dataset

        mv train.csv test.csv hf_dataset/
        cd hf_dataset

        git add train.csv test.csv

        git commit -m "Automated update: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || { echo "No new changes to upload."; exit 0; }

        git push origin HEAD:main