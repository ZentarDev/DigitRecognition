name: Sync Supabase Dataset to Hugging Face

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install dependencies
      run: npm install @supabase/supabase-js

    - name: Fetch data and build CSV
      env:
        SUPABASE_URL: "https://tkyimsswodyghjzekutl.supabase.co"
        SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: |
        node -e '
        const { createClient } = require("@supabase/supabase-js");
        const fs = require("fs");

        const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_KEY);

        async function fetchAll() {
          let all = [];
          let from = 0;
          const pageSize = 1000;
          while (true) {
            const { data, error } = await supabase
              .from("digits")
              .select("image_base64, prediction, correct, true_label")
              .range(from, from + pageSize - 1);
            if (error) process.exit(1);
            if (!data.length) break;
            all = all.concat(data);
            if (data.length < pageSize) break;
            from += pageSize;
          }
          return all;
        }

        async function exportData() {
          const data = await fetchAll();
          const validData = data.filter(row => row.correct === true || row.correct === "true");
          const allRows = validData.map(row => `"${row.image_base64}",${row.prediction},${row.correct},${row.true_label}\n`);

          allRows.sort(() => Math.random() - 0.5);

          const totalRows = allRows.length;
          const testCount = Math.round(totalRows * 0.2);
          const testRows = allRows.slice(0, testCount);
          const trainRows = allRows.slice(testCount);

          const header = "image_base64,prediction,correct,true_label\n";
          fs.writeFileSync("train.csv", header + trainRows.join(""));
          fs.writeFileSync("test.csv", header + testRows.join(""));
        }

        exportData();
        '

    - name: Push to Hugging Face
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HF_REPO: "zentardev/handwritten-digit-dataset"
      run: |
        git config --global user.name "Github Actions Robot"
        git config --global user.email "actions@github.com"

        git clone https://oauth2:$HF_TOKEN@huggingface.co/datasets/$HF_REPO hf_dataset

        mv train.csv test.csv hf_dataset/
        cd hf_dataset

        git add train.csv test.csv

        git commit -m "Automated update: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || exit 0

        git push origin HEAD:main