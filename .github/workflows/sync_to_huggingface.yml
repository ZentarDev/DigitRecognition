name: Sync Supabase Dataset to Hugging Face

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install dependencies
      run: npm install @supabase/supabase-js

    - name: Fetch data and build CSV
      env:
        SUPABASE_URL: "https://tkyimsswodyghjzekutl.supabase.co"
        SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: |
        node -e '
        const { createClient } = require("@supabase/supabase-js");
        const fs = require("fs");

        const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_KEY);

        async function exportData() {
          const { data, error } = await supabase
            .from("digits")
            .select("image_base64, prediction, correct");

          if (error) {
            console.error("Error fetching data:", error.message);
            process.exit(1);
          }

          // Crear cabecera del archivo CSV
          let csvContent = "image_base64,prediction,correct\n";
          
          // Formatear cada fila envolviendo el base64 en comillas por si tiene comas internas
          data.forEach(row => {
            csvContent += `"${row.image_base64}",${row.prediction},${row.correct}\n`;
          });

          fs.writeFileSync("dataset.csv", csvContent);
          console.log("CSV creado con éxito con " + data.length + " filas.");
        }

        exportData();
        '

    - name: Push to Hugging Face
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HF_REPO: "zentardev/handwritten-digit-dataset" 
      run: |
        git config --global user.name "Github Actions Robot"
        git config --global user.email "actions@github.com"
        
        git clone https://oauth2:$HF_TOKEN@huggingface.co/datasets/$HF_REPO hf_dataset
        
        mv dataset.csv hf_dataset/
        
        cd hf_dataset
        git add dataset.csv
        git commit -m "Automated update: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || exit 0
        git push origin main